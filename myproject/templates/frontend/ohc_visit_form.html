{% extends "frontend/base.html" %}

{% block content %}
<section class="form-layout">
    <div class="panel-card">
        <div class="section-head">
            <h4>Visit Intake Form</h4>
            <span class="section-badge">OHC</span>
        </div>
        <form class="portal-form" data-api-endpoint="/api/ohc/visits/">
            <div class="form-intro">
                <h4>Patient Information</h4>
                <p>Enter the employee's details and visit information below.</p>
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Employee Profile ID</label>
                    <input class="form-control" name="employee" placeholder="e.g., EMP-001" required>
                    <small class="form-text text-muted">Find this in employee records</small>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Clinical Staff</label>
                    <input class="form-control" name="consulted_doctor" placeholder="Auto-filled for logged-in staff" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Visit Type</label>
                    <select class="form-select" name="visit_type" required>
                        <option value="">Select type</option>
                        <option value="WALK_IN">Walk-in Visit</option>
                        <option value="PERIODIC">Periodic Checkup</option>
                        <option value="PRE_EMPLOYMENT">Pre-employment</option>
                        <option value="FOLLOW_UP">Follow-up</option>
                        <option value="EMERGENCY">Emergency</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Urgency Level</label>
                    <select class="form-select" name="triage_level" required>
                        <option value="">Select urgency</option>
                        <option value="LOW">Low</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="HIGH">High</option>
                        <option value="CRITICAL">Critical</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Visit Date & Time</label>
                    <input type="datetime-local" class="form-control" name="visit_date" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Chief Complaint</label>
                    <input class="form-control" name="chief_complaint" placeholder="What's the main reason for the visit?" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Detailed Symptoms</label>
                    <textarea class="form-control" rows="4" name="symptoms" placeholder="Describe symptoms in detail: fever, pain, breathing issues, etc." required></textarea>
                </div>
                <div class="col-12">
                    <div class="section-head mb-2">
                        <h5 class="mb-0">Vitals</h5>
                        <span class="section-badge">Simple Entry</span>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Temperature</label>
                    <input class="form-control vitals-input" data-vital-key="temperature" placeholder="98.6 F">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Blood Pressure</label>
                    <input class="form-control vitals-input" data-vital-key="blood_pressure" placeholder="120/80 mmHg">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Pulse</label>
                    <input class="form-control vitals-input" data-vital-key="pulse" placeholder="76 bpm">
                </div>
                <div class="col-md-4">
                    <label class="form-label">SpO2</label>
                    <input class="form-control vitals-input" data-vital-key="spo2" placeholder="98 %">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Weight</label>
                    <input class="form-control vitals-input" data-vital-key="weight" placeholder="68 kg">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Height</label>
                    <input class="form-control vitals-input" data-vital-key="height" placeholder="172 cm">
                </div>
                <div class="col-12">
                    <input type="hidden" name="vitals" class="vitals-json-field">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Preliminary Notes</label>
                    <textarea class="form-control" rows="5" name="preliminary_notes" placeholder="Initial observations and context"></textarea>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-brand">Create OHC Visit</button>
                <button type="reset" class="btn btn-outline-light">Reset</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
